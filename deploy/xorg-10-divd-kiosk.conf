# DIVD kiosk X server hardening — installed to /etc/X11/xorg.conf.d/
# Stops the classic console-escape tricks at the X-server level.
Section "ServerFlags"
    # Disable Ctrl+Alt+F1..F12 VT switching (no dropping to a console).
    Option "DontVTSwitch" "true"
    # Disable Ctrl+Alt+Backspace "zap" that kills the X server.
    Option "DontZap" "true"
    # No screen blanking / power management from the server side either.
    Option "BlankTime" "0"
    Option "StandbyTime" "0"
    Option "SuspendTime" "0"
    Option "OffTime" "0"
EndSection
