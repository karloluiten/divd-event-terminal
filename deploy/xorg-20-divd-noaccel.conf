# DIVD kiosk — work around the Xorg+glamor abort on the Pi 5's V3D GPU.
# The kiosk page is trivial to render, so we disable GL acceleration and let
# the modesetting driver use its shadow framebuffer instead. This avoids the
# glamor/EGL crash seen when starting bare Xorg (the stock Pi 5 desktop is
# Wayland, so this GL path is otherwise untested on the device).
Section "Device"
    Identifier "vc4-kms"
    Driver "modesetting"
    Option "AccelMethod" "none"
EndSection
