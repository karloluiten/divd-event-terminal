  <!-- RIGHT COLUMN -->
  <text font-family="'DejaVu Sans Mono', monospace" font-size="14.5" fill="#79e6a4" xml:space="preserve">
    <tspan x="536" y="200" fill="#5ff09a" font-weight="bold">▌ commands_people_typed.log</tspan>
    <tspan x="540" dy="28" fill="#9affc4">$ whoami</tspan><tspan dx="26">$ id</tspan>
    <tspan x="540" dy="22" fill="#9affc4">$ ls -la</tspan><tspan dx="22">$ ls</tspan>
    <tspan x="540" dy="22" fill="#9affc4">$ ifconfig</tspan><tspan dx="14">$ ps aux</tspan>
    <tspan x="540" dy="22" fill="#9affc4">$ top</tspan><tspan dx="40">$ cat root.txt</tspan>
    <tspan x="540" dy="22" fill="#9affc4">$ su -</tspan><tspan dx="38">$ reboot</tspan>
    <tspan x="540" dy="22" fill="#9affc4">$ apt update &amp;&amp; apt upgrade</tspan>
    <tspan x="540" dy="22" fill="#9affc4">$ history · clear · cls · cat</tspan>
    <tspan x="540" dy="22" fill="#4f9c6c"># psst: it's an idea box, not a shell</tspan>
    <tspan x="536" dy="42" fill="#ffcc66" font-weight="bold">▌ injection.warn</tspan>
    <tspan x="540" dy="28" fill="#ffd98a">! &lt;marquee&gt;&lt;img src=//s42.re/…&gt;</tspan>
    <tspan x="540" dy="22" fill="#ffd98a">! $(ls)</tspan><tspan dx="30">! `echo ls`</tspan>
    <tspan x="540" dy="22" fill="#ffd98a">! \\\\|||\  (keysmash, contained)</tspan>
    <tspan x="536" dy="42" fill="#57e6e6" font-weight="bold">▌ links.url</tspan>
    <tspan x="540" dy="28" fill="#7fd9ff">↳ blog.mgdproductions.com</tspan>
    <tspan x="540" dy="22" fill="#7fd9ff">↳ digitaledollemina.nl</tspan>
    <tspan x="540" dy="22" fill="#7fd9ff">↳ wiccon.nl</tspan>
  </text>

