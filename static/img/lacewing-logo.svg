<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-label="Project Lacewing">
  <title>Project Lacewing</title>

  <!-- Left forewing: large rounded oval, sweeping upper-left -->
  <path d="M30 26 C24 20,12 12,6 10 C8 20,12 28,22 32 C26 33,29 31,30 26 Z"
        fill="#cce8df" opacity="0.78"/>

  <!-- Right forewing: mirror -->
  <path d="M34 26 C40 20,52 12,58 10 C56 20,52 28,42 32 C38 33,35 31,34 26 Z"
        fill="#cce8df" opacity="0.78"/>

  <!-- Left hindwing: smaller, trailing -->
  <path d="M30 34 C22 36,10 44,8 52 C12 46,18 42,24 40 C20 46,16 52,16 57 C20 51,26 47,30 42 Z"
        fill="#cce8df" opacity="0.60"/>

  <!-- Right hindwing: mirror -->
  <path d="M34 34 C42 36,54 44,56 52 C52 46,46 42,40 40 C44 46,48 52,48 57 C44 51,38 47,34 42 Z"
        fill="#cce8df" opacity="0.60"/>

  <!-- Wing venation - left forewing -->
  <path d="M30 26 C22 20,14 14,6 10" fill="none" stroke="#4a9e8a" stroke-width="0.55"/>
  <path d="M29 29 C21 25,13 20,7 18" fill="none" stroke="#4a9e8a" stroke-width="0.38"/>
  <path d="M26 32 C18 30,12 27,8 24" fill="none" stroke="#4a9e8a" stroke-width="0.3"/>
  <line x1="15" y1="16" x2="13" y2="25" stroke="#4a9e8a" stroke-width="0.28"/>
  <line x1="10" y1="13" x2="9" y2="20" stroke="#4a9e8a" stroke-width="0.25"/>
  <line x1="18" y1="23" x2="15" y2="29" stroke="#4a9e8a" stroke-width="0.25"/>
  <line x1="23" y1="28" x2="21" y2="32" stroke="#4a9e8a" stroke-width="0.25"/>

  <!-- Wing venation - right forewing (mirrored) -->
  <path d="M34 26 C42 20,50 14,58 10" fill="none" stroke="#4a9e8a" stroke-width="0.55"/>
  <path d="M35 29 C43 25,51 20,57 18" fill="none" stroke="#4a9e8a" stroke-width="0.38"/>
  <path d="M38 32 C46 30,52 27,56 24" fill="none" stroke="#4a9e8a" stroke-width="0.3"/>
  <line x1="49" y1="16" x2="51" y2="25" stroke="#4a9e8a" stroke-width="0.28"/>
  <line x1="54" y1="13" x2="55" y2="20" stroke="#4a9e8a" stroke-width="0.25"/>
  <line x1="46" y1="23" x2="49" y2="29" stroke="#4a9e8a" stroke-width="0.25"/>
  <line x1="41" y1="28" x2="43" y2="32" stroke="#4a9e8a" stroke-width="0.25"/>

  <!-- Abdomen: elongated, slightly tapered toward tail -->
  <path d="M30.5 31 C30 41,29.5 50,31 57 C31.5 59,32.5 59.5,33 57 C34.5 50,34 41,33.5 31 Z"
        fill="#4a9e8a"/>

  <!-- Thorax -->
  <ellipse cx="32" cy="25" rx="3" ry="5" fill="#3d8b7a"/>

  <!-- Head -->
  <ellipse cx="32" cy="17" rx="3.5" ry="3" fill="#1a3157"/>

  <!-- Eyes: prominent copper-red compound eyes, characteristic of lacewings -->
  <circle cx="29.5" cy="16.5" r="2.1" fill="#bf5e1a"/>
  <circle cx="34.5" cy="16.5" r="2.1" fill="#bf5e1a"/>
  <circle cx="29" cy="16" r="0.7" fill="#e07830" opacity="0.6"/>
  <circle cx="34" cy="16" r="0.7" fill="#e07830" opacity="0.6"/>

  <!-- Antennae: long thin arcs, very characteristic of lacewings -->
  <path d="M30 14.5 C27 10,23 6,17 2" fill="none" stroke="#6b4a2a" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M34 14.5 C37 10,41 6,47 2" fill="none" stroke="#6b4a2a" stroke-width="0.9" stroke-linecap="round"/>
</svg>
